name: Hourly Stock + Congress Pipeline

on:
  schedule:
    - cron: "5 * * * *"   # every hour at :05
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: false   # don't kill an in-flight run; idempotent anyway

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt
      # Opt every JS action into Node.js 24 (Node 20 is deprecated June 2026)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          pip install -r requirements.txt
          # MotherDuck requires duckdb >= 1.5.2; dbt-duckdb pins an older
          # duckdb transitively, so force-upgrade it after the main install.
          pip install --upgrade 'duckdb>=1.5.2'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Extract (bronze)
        run: python fetch_market_data.py

      - name: dbt deps + seed + build
        working-directory: dbt
        run: |
          dbt deps
          dbt seed --target prod
          dbt build --target prod --fail-fast

      - name: Check Evidence scaffold
        id: evidence_check
        run: |
          if [ -f evidence/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Evidence not scaffolded yet — skipping build/deploy. See README."
          fi

      - name: Set up Node
        if: steps.evidence_check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: evidence/package-lock.json

      - name: Build Evidence site
        if: steps.evidence_check.outputs.exists == 'true'
        working-directory: evidence
        env:
          # Inject the real MotherDuck token into the motherduck source
          EVIDENCE_SOURCE__stock_tracker__token: ${{ secrets.MOTHERDUCK_TOKEN }}
          # Evidence + SvelteKit base path for GitHub Pages (/<repo-name>/)
          BASE: "/${{ github.event.repository.name }}"
        run: |
          npm ci
          npm run sources
          npm run build

      - name: Deploy to GitHub Pages
        if: steps.evidence_check.outputs.exists == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: evidence/build
